<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">
    <article data-testid="test-todo-card" class="card">

      <h2 data-testid="test-todo-title" id="todo-title">
        Build Todo Card UI
      </h2>

      <p data-testid="test-todo-description">
        Create a clean, accessible, and testable Todo card component using HTML, CSS, and JavaScript.
      </p>

      <div class="row">
        <span
          data-testid="test-todo-priority"
          class="badge priority"
          aria-label="High priority"
        >
          🔥 High
        </span>

        <span
          data-testid="test-todo-status"
          id="status"
        >
          In Progress
        </span>
      </div>

      <time
        data-testid="test-todo-due-date"
        id="due-date"
      ></time>
      <span>-</span>
      <time
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
      ></time>

      <ul data-testid="test-todo-tags" class="tags" role="list">
        <li data-testid="test-todo-tag-work">work</li>
        <li data-testid="test-todo-tag-urgent">urgent</li>
      </ul>

      <div class="actions">
        <label>
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="checkbox"
          />
          Mark as done
        </label>

        <div class="buttons">
          <button data-testid="test-todo-edit-button" id="edit-btn">
            Edit
          </button>

          <button data-testid="test-todo-delete-button" id="delete-btn">
            Delete
          </button>
        </div>
      </div>

    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
